[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "imap-cleanup-tool"
version = "0.1.0"
description = "Delete or move IMAP emails by sender, domain, or nested rules — CLI and GUI."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Giulio Alberello", email = "info@giulioalberello.it" }]
keywords = ["imap", "email", "gmail", "inbox", "cleanup", "email-cleanup",
            "inbox-cleanup", "mailbox", "imap-client", "spam", "cli", "gui",
            "tkinter", "python"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Communications :: Email",
    "Topic :: Utilities",
]
# No third-party runtime dependencies: stdlib only (imaplib, tkinter, argparse).
dependencies = []

[project.optional-dependencies]
# Tools for development and building the Windows executable.
dev = ["pylint", "pyinstaller", "build", "twine"]

[project.urls]
Homepage = "https://github.com/mrpickles007/imap-cleanup-tool"
Issues = "https://github.com/mrpickles007/imap-cleanup-tool/issues"

[project.scripts]
imap-cleanup-tool = "imap_cleanup_tool.cli:main"

[project.gui-scripts]
imap-cleanup-tool-gui = "imap_cleanup_tool.gui:main"

[tool.hatch.build.targets.wheel]
packages = ["src/imap_cleanup_tool"]
